// Initialize Firebase when SDK loads
function initFirebaseSDK() {
  if (typeof firebase === 'undefined') {
    setTimeout(initFirebaseSDK, 100);
    return;
  }
  
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);

// ── Multiplayer State (initialized later) ────────────────────────────────────
let playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
let otherPlayers = new Map();
let playerDataRef = null;
let firebaseReady = false;

function initFirebase() {
  if (!database) return setTimeout(initFirebase, 100);
  
  playerDataRef = database.ref('players');
  
  function publishPlayerState() {
    if (!playerDataRef) return;
    playerDataRef.child(playerId).set({
      pos: { x: pState.pos.x, y: pState.pos.y, z: pState.pos.z },
      heading: pState.heading,
      speed: pState.speed,
      gear: pState.gear,
      rpm: pState.rpm,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    }).catch(err => console.error('Publish error:', err));
  }

  function updateOtherPlayers(snapshot) {
    const playersData = snapshot.val() || {};
    for (const id in playersData) {
      if (id === playerId) continue;
      const data = playersData[id];
      if (Date.now() - data.timestamp > 3000) continue;

      if (!otherPlayers.has(id)) {
        const carGroup = new THREE.Group();
        const bm = new THREE.MeshStandardMaterial({ 
          color: Math.random() * 0xffffff, 
          metalness: 0.6, 
          roughness: 0.3 
        });
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.38, 4.4), bm);
        body.position.y = 0.28;
        carGroup.add(body);
        
        const pod = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.42, 2),
          new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        pod.position.set(0, 0.62, 0.15);
        carGroup.add(pod);
        
        const wheels = [];
        const wgeo = new THREE.CylinderGeometry(0.37, 0.37, 0.44, 10);
        const wmat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const wheelPos = [[0.93,0.37,1.55],[-0.93,0.37,1.55],[0.93,0.37,-1.55],[-0.93,0.37,-1.55]];
        
        wheelPos.forEach(pos => {
          const w = new THREE.Mesh(wgeo, wmat);
          w.rotation.z = Math.PI / 2;
          w.position.set(...pos);
          carGroup.add(w);
          wheels.push(w);
        });

        carGroup.traverse(c => {
          if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
        });

        scene.add(carGroup);
        otherPlayers.set(id, {
          mesh: carGroup,
          wheels: wheels,
          lastUpdate: Date.now(),
          smoothPos: new THREE.Vector3(data.pos.x, data.pos.y, data.pos.z),
          smoothHeading: data.heading,
          data: data
        });
      }

      const player = otherPlayers.get(id);
      player.data = data;
      player.lastUpdate = Date.now();
      
      const targetPos = new THREE.Vector3(data.pos.x, data.pos.y, data.pos.z);
      player.smoothPos.lerp(targetPos, 0.15);
      player.mesh.position.copy(player.smoothPos);
      
      let headingDiff = data.heading - player.smoothHeading;
      while (headingDiff > Math.PI) headingDiff -= Math.PI * 2;
      while (headingDiff < -Math.PI) headingDiff += Math.PI * 2;
      player.smoothHeading += headingDiff * 0.15;
      player.mesh.rotation.y = player.smoothHeading + MODEL_YAW_OFFSET;
      
      const ds = data.speed * 0.016 * 2.5;
      player.wheels.forEach(w => w.rotation.x += ds);
    }

    for (const [id, player] of otherPlayers) {
      if (Date.now() - player.lastUpdate > 4000) {
        scene.remove(player.mesh);
        otherPlayers.delete(id);
      }
    }
  }

  playerDataRef.on('value', updateOtherPlayers);
  window.publishPlayerState = publishPlayerState;
  firebaseReady = true;
}

window.addEventListener('beforeunload', () => {
  if (playerDataRef) {
    playerDataRef.child(playerId).remove();
    playerDataRef.off();

});

// ── Track ────────────────────────────────────────────────────────────────────
const trackCurve = new THREE.CatmullRomCurve3([
  [0,0,-320],[80,0,-340],[200,0,-330],[310,0,-260],[370,0,-140],[360,0,-20],
  [310,0,80],[230,0,150],[170,0,210],[160,0,310],[100,0,390],[0,0,420],
  [-120,0,400],[-240,0,350],[-330,0,260],[-370,0,140],[-360,0,20],
  [-300,0,-80],[-210,0,-150],[-120,0,-190],[-50,0,-270],[-10,0,-320]
].map(p => new THREE.Vector3(...p)), true, 'catmullrom', 0.4);

const N_SEG = 500;

(function buildWorld() {
  const pts = trackCurve.getSpacedPoints(N_SEG);
  const frames = trackCurve.computeFrenetFrames(N_SEG, true);
  const TW = 24, KW = 4;

  // ── Road ──
  const vpos = [], vuv = [], vidx = [];
  for (let i = 0; i <= N_SEG; i++) {
    const ii = i % pts.length;
    const p = pts[ii], b = frames.binormals[ii];
    const u = i / N_SEG;
    // verts: outerL-kerb, innerL-kerb, roadL, roadR, innerR-kerb, outerR-kerb
    [-TW-KW, -TW, -TW, TW, TW, TW+KW].forEach((o, j) => {
      vpos.push(p.x + b.x * o, p.y + 0.03, p.z + b.z * o);
      vuv.push(j / 5, u * 20);
    });
  }
  for (let i = 0; i < N_SEG; i++) {
    const a = i * 6, b = a + 6;
    // Road surface (cols 1-4 → 3 quads)
    [[1,2],[2,3],[3,4]].forEach(([l,r]) => vidx.push(a+l,a+r,b+r, a+l,b+r,b+l));
    // Kerbs
    vidx.push(a,a+1,b+1, a,b+1,b);
    vidx.push(a+4,a+5,b+5, a+4,b+5,b+4);
  }
  const roadGeo = new THREE.BufferGeometry();
  roadGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vpos), 3));
  roadGeo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(vuv), 2));
  roadGeo.setIndex(vidx);
  roadGeo.computeVertexNormals();

  const road = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({ color: 0x252525, roughness: 0.92, side: THREE.DoubleSide }));
  road.receiveShadow = true;
  scene.add(road);

  // White centre dashes
  const dashMesh = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(trackCurve.getSpacedPoints(N_SEG)),
    new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.35, transparent: true })
  );
  dashMesh.position.y = 0.07;
  scene.add(dashMesh);

  // ── Barriers ──
  const bMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 });
  const bMatR = new THREE.MeshStandardMaterial({ color: 0xdd1111, roughness: 0.5 });
  for (let i = 0; i < N_SEG; i += 4) {
    const ii = i % pts.length;
    const p = pts[ii], b = frames.binormals[ii], t = frames.tangents[ii];
    const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(1,0,0), t.clone().normalize());
    [-1, 1].forEach((side, si) => {
      const bp = new THREE.Vector3(p.x + b.x * side * 29, 0.6, p.z + b.z * side * 29);
      const seg = new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 0.9), i % 8 < 4 ? bMat : bMatR);
      seg.position.copy(bp);
      seg.quaternion.copy(q);
      seg.castShadow = true;
      scene.add(seg);
    });
  }

  // ── Scenery ──
  const trunkM = new THREE.MeshStandardMaterial({ color: 0x6b4c11 });
  const leafM  = new THREE.MeshStandardMaterial({ color: 0x2a6e2a });
  for (let i = 0; i < 200; i++) {
    const a = Math.random()*Math.PI*2, r = 500 + Math.random()*700;
    const x = Math.cos(a)*r, z = Math.sin(a)*r, h = 8 + Math.random()*14;
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, h, 7), trunkM);
    trunk.position.set(x, h/2, z);
    const crown = new THREE.Mesh(new THREE.ConeGeometry(4+Math.random()*4, h*0.9, 7), leafM);
    crown.position.set(x, h + crown.geometry.parameters.height/2 - 1, z);
    scene.add(trunk); scene.add(crown);
  }

  // Grandstands
  const gsMat   = new THREE.MeshStandardMaterial({ color: 0x777777 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const crowdCols = [0xe10600, 0xffffff, 0x003399, 0xffcc00, 0x00aa33];
  for (let i = 0; i < 5; i++) {
    const x = -120 + i*60, z = -355;
    const gs = new THREE.Mesh(new THREE.BoxGeometry(56, 16, 14), gsMat);
    gs.position.set(x, 8, z); scene.add(gs);
    const roof = new THREE.Mesh(new THREE.BoxGeometry(58, 1.5, 16), roofMat);
    roof.position.set(x, 17, z); scene.add(roof);
    const crowd = new THREE.Mesh(new THREE.BoxGeometry(54, 6, 1), new THREE.MeshStandardMaterial({ color: crowdCols[i] }));
    crowd.position.set(x, 9, z + 7); scene.add(crowd);
  }
  // Pit building
  const pit = new THREE.Mesh(new THREE.BoxGeometry(90, 10, 22), new THREE.MeshStandardMaterial({ color: 0x444444 }));
  pit.position.set(0, 5, -375); scene.add(pit);
  // Start/finish gantry
  const gantry = new THREE.Mesh(new THREE.BoxGeometry(66, 7, 2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
  gantry.position.set(0, 10, -322); scene.add(gantry);
})();

// ── GLB Parser ────────────────────────────────────────────────────────────────
function parseGLB(buffer) {
  const dv = new DataView(buffer);
  let off = 12;
  const jLen = dv.getUint32(off, true); off += 8;
  const gltf = JSON.parse(new TextDecoder().decode(new Uint8Array(buffer, off, jLen)));
  off += jLen;
  let bin = null;
  if (off < buffer.byteLength) { const bLen = dv.getUint32(off,true); off += 8; bin = buffer.slice(off, off+bLen); }

  const ACC = { SCALAR:1, VEC2:2, VEC3:3, VEC4:4, MAT4:16 };
  const TARR = { 5120:Int8Array,5121:Uint8Array,5122:Int16Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array };
  const bvs = (gltf.bufferViews||[]).map(bv => ({ d: bin ? bin.slice(bv.byteOffset||0,(bv.byteOffset||0)+bv.byteLength):null, s: bv.byteStride }));

  function getAcc(i) {
    const a = gltf.accessors[i], bv = bvs[a.bufferView], bo = a.byteOffset||0, c = ACC[a.type], T = TARR[a.componentType], tot = a.count*c;
    if (bv.s && bv.s !== c*T.BYTES_PER_ELEMENT) {
      const out = new T(tot), src = new T(bv.d), st = bv.s/T.BYTES_PER_ELEMENT, ss = bo/T.BYTES_PER_ELEMENT;
      for (let i=0; i<a.count; i++) for (let j=0; j<c; j++) out[i*c+j]=src[ss+i*st+j];
      return out;
    }
    return new T(bv.d, bo, tot);
  }

  const mats = (gltf.materials||[]).map(mat => {
    const pbr = mat.pbrMetallicRoughness||{};
    const col = pbr.baseColorFactor||[0.8,0.8,0.8,1];
    const n = mat.name||'';
    const opts = {
      color: new THREE.Color(col[0],col[1],col[2]),
      metalness: pbr.metallicFactor??0.5,
      roughness: pbr.roughnessFactor??0.5,
      side: THREE.DoubleSide
    };
    if (n==='Body')     { opts.color=new THREE.Color(0.9,0.04,0.0); opts.metalness=0.85; opts.roughness=0.12; }
    if (n==='Glass')    { opts.color=new THREE.Color(0.3,0.5,0.85); opts.transparent=true; opts.opacity=0.35; opts.metalness=0.9; opts.roughness=0.05; }
    if (n==='Wheels')   { opts.color=new THREE.Color(0.1,0.1,0.1); opts.roughness=0.85; }
    if (n==='Interior') { opts.color=new THREE.Color(0.07,0.07,0.07); }
    return new THREE.MeshStandardMaterial(opts);
  });

  const meshGroups = (gltf.meshes||[]).map(mesh => {
    const g = new THREE.Group(); g.name = mesh.name;
    mesh.primitives.forEach(prim => {
      const geo = new THREE.BufferGeometry(), at = prim.attributes;
      if (at.POSITION!==undefined) geo.setAttribute('position', new THREE.BufferAttribute(getAcc(at.POSITION), 3));
      if (at.NORMAL!==undefined)   geo.setAttribute('normal',   new THREE.BufferAttribute(getAcc(at.NORMAL), 3));
      if (at.TEXCOORD_0!==undefined) geo.setAttribute('uv', new THREE.BufferAttribute(getAcc(at.TEXCOORD_0), 2));
      if (prim.indices!==undefined) geo.setIndex(new THREE.BufferAttribute(getAcc(prim.indices), 1));
      const m = new THREE.Mesh(geo, prim.material!==undefined ? mats[prim.material] : new THREE.MeshStandardMaterial());
      m.castShadow = true; m.receiveShadow = true;
      g.add(m);
    });
    return g;
  });

  const nodeObjs = (gltf.nodes||[]).map(node => {
    const obj = node.mesh!==undefined ? meshGroups[node.mesh] : new THREE.Group();
    obj.name = node.name||'';
    if (node.matrix) {
      const mat = new THREE.Matrix4().fromArray(node.matrix);
      obj.applyMatrix4(mat);
    } else {
      if (node.translation) obj.position.fromArray(node.translation);
      if (node.rotation) obj.quaternion.fromArray(node.rotation);
      if (node.scale) obj.scale.fromArray(node.scale);
    }
    return obj;
  });

  const root = new THREE.Group();
  (gltf.scenes[gltf.scene||0]).nodes.forEach(n => root.add(nodeObjs[n]));
  return { root, nodeObjs, names: (gltf.nodes||[]).map(n=>n.name||'') };
}

// ── Car physics ───────────────────────────────────────────────────────────────
const MAX_SPD = 86, ACCEL = 28, BRAKEFORCE = 55, DRAG_K = 0.018, TURN = 1.55;
const GEARS = [0, 18, 34, 50, 66, 80, MAX_SPD+5];
const ROAD_HALF_WIDTH = 24.0;
const ROAD_BARRIER_LIMIT = 29.0;
const MODEL_YAW_OFFSET = -Math.PI / 2;
const trackCollisionOffset = new THREE.Vector3();
const trackCollisionPush = new THREE.Vector3();
const trackCollisionSide = new THREE.Vector3();

function applyTrackCollision(s) {
  const center = trackCurve.getPointAt(s.trackT);
  const tangent = trackCurve.getTangentAt(s.trackT);
  trackCollisionSide.set(-tangent.z, 0, tangent.x).normalize();
  trackCollisionOffset.copy(s.pos).sub(center);
  const offset = trackCollisionOffset.dot(trackCollisionSide);
  const absOffset = Math.abs(offset);
  if (absOffset <= ROAD_HALF_WIDTH) return;
  const targetOffset = Math.sign(offset) * ROAD_HALF_WIDTH;
  s.pos.copy(center).addScaledVector(trackCollisionSide, targetOffset);
  s.speed *= 0.45;
  if (absOffset > ROAD_BARRIER_LIMIT) s.speed *= 0.2;
}

function mkState(tOff) {
  return {
    pos: new THREE.Vector3(), heading: 0, speed: 0, steer: 0,
    trackT: tOff, gear: 1, rpm: 0.1, wSpin: 0, lastT: tOff
  };
}

const pState = mkState(0.0);

function findT(pos, lastT) {
  const STEP = 1/N_SEG;
  let best = lastT, bd = Infinity;
  for (let i = -40; i < 60; i++) {
    const t = ((lastT + i*STEP) % 1 + 1) % 1;
    const d = pos.distanceToSquared(trackCurve.getPointAt(t));
    if (d < bd) { bd = d; best = t; }
  }
  return best;
}

function physStep(s, dt, thr, brk, str) {
  // Steering
  s.steer += (str - s.steer) * Math.min(3.0 * dt, 1);
  if (str === 0) s.steer *= Math.max(0, 1 - 6.0 * dt);
  // Speed
  const drag = DRAG_K * s.speed * Math.abs(s.speed);
  if (thr > 0) {
    s.speed += ACCEL * dt * (1 - Math.abs(s.speed) / MAX_SPD);
  } else if (brk > 0) {
    if (s.speed > 0) {
      s.speed = Math.max(-MAX_SPD * 0.5, s.speed - BRAKEFORCE * dt);
    } else {
      s.speed = Math.max(-MAX_SPD * 0.5, s.speed - ACCEL * 0.6 * dt);
    }
  } else {
    s.speed *= Math.max(0, 1 - 3.5 * dt);
    if (Math.abs(s.speed) < 0.15) s.speed = 0;
  }
  s.speed -= drag * dt;
  s.speed = Math.max(-MAX_SPD * 0.5, Math.min(MAX_SPD, s.speed));
  // Heading
  if (Math.abs(s.speed) > 0.2) {
    const turnFactor = (1 / (1 + Math.abs(s.speed) * 0.05)) * (Math.abs(s.speed) / 16);
    s.heading += s.steer * TURN * turnFactor * dt * Math.sign(s.speed);
  }
  // Position
  s.pos.x += Math.sin(s.heading) * s.speed * dt;
  s.pos.z += Math.cos(s.heading) * s.speed * dt;
  // Wheel spin
  s.wSpin += s.speed * dt * 2.8;
  // Gear
  for (let g = 1; g < GEARS.length; g++) { if (s.speed < GEARS[g]) { s.gear = g; break; } }
  const gMin = GEARS[s.gear-1], gMax = GEARS[s.gear];
  s.rpm = Math.max(0.1, Math.min(1, (s.speed - gMin) / (gMax - gMin)));
  // Track progress
  s.trackT = findT(s.pos, s.trackT);
  applyTrackCollision(s);
}

// ── AI car proxy mesh ─────────────────────────────────────────────────────────
function recolorCarGroup(group, color) {
  const bodyColor = new THREE.Color(color);
  group.traverse(child => {
    if (!child.isMesh) return;
    const mat = child.material.clone();
    const name = (mat.name || '').toLowerCase();
    if (name.includes('body') || name.includes('paint') || name === '') {
      mat.color.copy(bodyColor);
      mat.roughness = 0.18;
      mat.metalness = 0.85;
      mat.emissive = new THREE.Color(0x110000);
      mat.emissiveIntensity = 0.08;
    } else if (name.includes('glass')) {
      mat.color.set(0x89b5ff);
      mat.roughness = 0.08;
      mat.metalness = 0.9;
      mat.transparent = true;
      mat.opacity = 0.35;
    } else if (name.includes('wheel') || name.includes('tyre') || name.includes('rim')) {
      mat.color.set(0x111111);
      mat.roughness = 0.95;
      mat.metalness = 0.2;
    }
    child.material = mat;
    child.castShadow = true;
    child.receiveShadow = true;
  });
}

function cloneCarModel(template, color) {
  const clone = template.clone(true);
  recolorCarGroup(clone, color);
  return clone;
}

async function beginDrive() {
  setLoad(90, 'POSITIONING CAR...');
  await new Promise(r => setTimeout(r, 20));

  const startOffset = -5.5;
  placeOnTrack(pState, startOffset);
  playerMesh.position.copy(pState.pos);
  playerMesh.rotation.y = pState.heading + MODEL_YAW_OFFSET;

  setLoad(100, 'READY!');
  await new Promise(r => setTimeout(r, 350));

  // Initialize Firebase after scene is ready
  initFirebase();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  ready = true;
}

async function buildFallbackPlayerCar() {
  setLoad(60, 'USING FALLBACK CAR...');
  await new Promise(r => setTimeout(r, 20));
  const g = new THREE.Group();
  const bm = new THREE.MeshStandardMaterial({ color: 0xe10600, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.38, 4.4), bm);
  body.position.y = 0.28; g.add(body);
  const pod = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.42, 2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
  pod.position.set(0, 0.62, 0.15); g.add(pod);
  const fw = new THREE.Mesh(new THREE.BoxGeometry(2.35, 0.07, 0.45), bm);
  fw.position.set(0, 0.18, 2.05); g.add(fw);
  const rw = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.32, 0.28), bm);
  rw.position.set(0, 0.85, -2.0); g.add(rw);
  const wgeo = new THREE.CylinderGeometry(0.37, 0.37, 0.44, 10);
  const wmat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
  const ws = [[0.93,0.37,1.55],[-0.93,0.37,1.55],[0.93,0.37,-1.55],[-0.93,0.37,-1.55]].map(p => {
    const w = new THREE.Mesh(wgeo, wmat); w.rotation.z = Math.PI/2; w.position.set(...p); g.add(w); return w;
  });
  g.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  scene.add(g);
  playerMesh = g;
  playerWheels = ws;
  await beginDrive();
}

// ── State ─────────────────────────────────────────────────────────────────────
let playerTemplate = null;
let playerMesh = null, playerWheels = [];
let ready = false;
let camMode = 0;
const camTgt = new THREE.Vector3();

// Keys — use a Set so no edge-case issues
const K = new Set();
window.addEventListener('keydown', e => { K.add(e.code); if (e.code==='KeyC') camMode=(camMode+1)%3; });
window.addEventListener('keyup',   e => K.delete(e.code));

// RPM bar
const rpmWrap = document.getElementById('rpm-wrap');
for (let i=0; i<12; i++) { const d=document.createElement('div'); d.className='rs'; rpmWrap.appendChild(d); }

// ── Camera ───────────────────────────────────────────────────────────────────
function updateCam(s) {
  const fwd = new THREE.Vector3(Math.sin(s.heading), 0, Math.cos(s.heading));
  let tp, lt;
  if (camMode === 0) {         // Chase
    tp = s.pos.clone().addScaledVector(fwd, -10).add(new THREE.Vector3(0,4.5,0));
    lt = s.pos.clone().addScaledVector(fwd,  10).add(new THREE.Vector3(0,1.2,0));
  } else if (camMode === 1) { // Low
    tp = s.pos.clone().addScaledVector(fwd,  -6).add(new THREE.Vector3(0,2.0,0));
    lt = s.pos.clone().addScaledVector(fwd,  12).add(new THREE.Vector3(0,1.0,0));
  } else {                    // Cinematic
    tp = s.pos.clone().addScaledVector(fwd, -28).add(new THREE.Vector3(0,16,0));
    lt = s.pos.clone().addScaledVector(fwd,  15);
  }
  camera.position.lerp(tp, 0.08);
  camTgt.lerp(lt, 0.1);
  camera.lookAt(camTgt);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function hudUpdate(s) {
  document.getElementById('spd').textContent  = Math.round(s.speed * 3.6);
  document.getElementById('gear').textContent = ['N','1','2','3','4','5','6'][s.gear] || s.gear;

  const segs = rpmWrap.children, lit = Math.round(s.rpm * 12);
  for (let i=0; i<12; i++) {
    const f = i/12;
    segs[i].style.background = i < lit ? (f>0.83?'#e10600':f>0.62?'#ffb700':'#00cc66') : '#111';
  }
}

// ── Place car on track ────────────────────────────────────────────────────────
function placeOnTrack(s, offset = 0) {
  const pt = trackCurve.getPointAt(s.trackT);
  const tn = trackCurve.getTangentAt(s.trackT);
  const side = new THREE.Vector3(-tn.z, 0, tn.x).normalize();
  s.pos.copy(pt).addScaledVector(side, offset).setY(0.3);
  s.heading = Math.atan2(tn.x, tn.z);
}

// ── Load GLB buffer → build player car ───────────────────────────────────────
function setLoad(p, m) {
  document.getElementById('load-bar').style.width = p + '%';
  document.getElementById('load-msg').textContent = m;
}

async function buildPlayerCar(buffer) {
  setLoad(60, 'PARSING MODEL...');
  await new Promise(r => setTimeout(r, 20));

  const { root, nodeObjs, names } = parseGLB(buffer);

  root.scale.setScalar(0.0600);
  root.rotation.set(0, 0, 0);

  playerTemplate = root;
  const wrapper = new THREE.Group();
  wrapper.rotation.y = MODEL_YAW_OFFSET;
  wrapper.add(cloneCarModel(root, 0xe10600));
  scene.add(wrapper);
  playerMesh = wrapper;
  playerWheels = [
    playerMesh.getObjectByName('WheelFL'),
    playerMesh.getObjectByName('WheelFR'),
    playerMesh.getObjectByName('WheelRL'),
    playerMesh.getObjectByName('WheelRR'),
  ].filter(Boolean);

  await beginDrive();
}

// ── Load car.glb automatically ───────────────────────────────────────────────
(async () => {
  try {
    setLoad(10, 'FETCHING car.glb...');
    const res = await fetch('./car.glb');
    if (!res.ok) throw new Error('car.glb not found');
    setLoad(40, 'MODEL LOADED');
    const buf = await res.arrayBuffer();
    await buildPlayerCar(buf);
  } catch(e) {
    console.warn('car.glb load failed, using fallback car:', e);
    document.getElementById('load-msg').textContent = 'MODEL LOAD FAILED — USING SIMPLE CAR';
    await buildFallbackPlayerCar();
  }
})();

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (ready) {
    const thr = (K.has('KeyW') || K.has('ArrowUp'))    ? 1 : 0;
    const brk = (K.has('KeyS') || K.has('ArrowDown'))  ? 1 : 0;
    const str = (K.has('KeyA') || K.has('ArrowLeft'))  ? 1
              : (K.has('KeyD') || K.has('ArrowRight')) ?  -1 : 0;

    physStep(pState, dt, thr, brk, str);

    // Publish position every 100ms
    if (firebaseReady && (!window.lastPublish || Date.now() - window.lastPublish > 100)) {
      window.publishPlayerState();
      window.lastPublish = Date.now();
    }

    if (playerMesh) {
      playerMesh.position.copy(pState.pos);
      playerMesh.rotation.y = pState.heading + MODEL_YAW_OFFSET;
      const ds = pState.speed * dt * 2.5;
      playerWheels.forEach(w => { if (w) w.rotation.x += ds; });
    }

    updateCam(pState);
    hudUpdate(pState);
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
